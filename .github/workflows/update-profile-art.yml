name: update-profile-art

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-profile-art:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare portrait asset
        run: python scripts/prep_photo.py images/profile.png

      - name: Build ASCII portrait
        run: python scripts/make_ascii_svg.py

      - name: Build info card
        run: python scripts/make_info_card.py

      - name: Fetch contributions
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit updated SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add avi-ascii.svg info-card.svg contrib-heatmap.svg images/source-prepped.png data/contributions.json
          git diff --cached --quiet || git commit -m "chore: refresh profile art [skip ci]"

      - name: Push changes
        run: git push
